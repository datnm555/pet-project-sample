version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: companyemployees-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - companyemployees-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Password123", "-Q", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Company Employees API
  companyemployees-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: companyemployees-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80;https://+:443
      - ASPNETCORE_HTTPS_PORT=5001
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourCertPassword123
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__sqlConnection=Server=sqlserver;Database=CompanyEmployee;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=true;MultipleActiveResultSets=true
      - JwtSettings__secretKey=CodeMazeSecretKey_ThisShouldBeChangedInProduction_MinLength32Chars!
    ports:
      - "5000:80"
      - "5001:443"
    volumes:
      - ./logs:/app/logs
      - ~/.aspnet/https:/https:ro
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - companyemployees-network

networks:
  companyemployees-network:
    driver: bridge

volumes:
  sqlserver-data: